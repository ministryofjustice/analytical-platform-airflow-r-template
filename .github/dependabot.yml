---
version: 2

updates:
  - package-ecosystem: "github-actions"
    commit-message:
      include: "scope"
      prefix: ":dependabot: github-actions"
    cooldown:
      default-days: 7
      exclude:
        - "ministryofjustice/analytical-platform-airflow-github-actions*"
    directory: "/"
    groups:
      analytical-platform-airflow-github-actions:
        patterns:
          - "ministryofjustice/analytical-platform-airflow-github-actions*"
    open-pull-requests-limit: 15
    schedule:
      interval: "daily"
  - package-ecosystem: "docker"
    commit-message:
      include: "scope"
      prefix: ":dependabot: docker"
    cooldown:
      default-days: 7
      exclude:
        - "ghcr.io/ministryofjustice/analytical-platform-airflow-python-base*"
    directory: "/"
    open-pull-requests-limit: 15
    schedule:
      interval: "daily"
  - package-ecosystem: "pre-commit"
    commit-message:
      include: "scope"
      prefix: ":dependabot: pre-commit"
    cooldown:
      default-days: 7
    directory: "/"
    open-pull-requests-limit: 15
    schedule:
      interval: "daily"
